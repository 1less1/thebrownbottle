services:

  # MySQL Database
  db:
    build: ./db-setup
    container_name: bb-db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: America/Chicago
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

      # SQL initialization files
      - ./db-setup/tbb-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db-setup/triggers.sql:/docker-entrypoint-initdb.d/02-triggers.sql:ro
      - ./db-setup/procedures.sql:/docker-entrypoint-initdb.d/03-procedures.sql:ro
      - ./db-setup/events.sql:/docker-entrypoint-initdb.d/04-events.sql:ro
      - ./db-setup/sample.sql:/docker-entrypoint-initdb.d/05-sample.sql:ro
      - ./db-setup/dev-accounts.sql:/docker-entrypoint-initdb.d/06-dev-accounts.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  api:
    build: ./api
    container_name: bb-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - DOMAIN=${DOMAIN}
      - WWW_DOMAIN=${WWW_DOMAIN}
    networks:
      - internal
    labels:
      - "traefik.enable=true"

      # Middleware definitions
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.rate-limit.rateLimit.average=100"
      - "traefik.http.middlewares.rate-limit.rateLimit.burst=50"

      # HTTP router (80) -> redirect to HTTPS + rate limit
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) || Host(`${WWW_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=redirect-to-https,rate-limit"

      # HTTPS router (443)
      - "traefik.http.routers.api-secure.rule=Host(`${DOMAIN}`) || Host(`${WWW_DOMAIN}`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-secure.middlewares=rate-limit"

      # Service port inside the container
      - "traefik.http.services.api.loadbalancer.server.port=5000"

    volumes:
      - ./api:/app

  # Static Web Frontend (Expo export served by nginx)
  web:
    image: nginx:alpine
    container_name: bb-web
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"

      # HTTPS router (443) for the web app
      - "traefik.http.routers.web-secure.rule=Host(`${APP_DOMAIN}`) || Host(`${WWW_APP_DOMAIN}`)"
      - "traefik.http.routers.web-secure.entrypoints=websecure"
      - "traefik.http.routers.web-secure.tls=true"
      - "traefik.http.routers.web-secure.tls.certresolver=letsencrypt"

      # Optional HTTP router (80) redirecting to HTTPS
      - "traefik.http.routers.web.rule=Host(`${APP_DOMAIN}`) || Host(`${WWW_APP_DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.middlewares=redirect-to-https"

  traefik:
    image: traefik:v3.6
    container_name: bb-traefik
    restart: always
    depends_on:
      - api
      - web
    env_file: .env
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Docker Provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app-network"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    name: app-network
    driver: bridge