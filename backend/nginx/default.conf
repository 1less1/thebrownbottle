server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cacheable static assets
  location /assets/ {
    try_files $uri =404;
  }

  # Expo web output often uses this folder
  location /_expo/ {
    try_files $uri =404;
  }

  # SPA fallback for deep links (Expo Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}