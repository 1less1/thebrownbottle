name: Deploy Web

on:
  # Runs when frontend code is pushed to main
  push:
    branches:
      - main
    paths:
      - "brown-bottle-app/**"
      - ".github/workflows/deploy-web.yml"

  # Allows manual testing from the Actions tab
  workflow_dispatch:

jobs:
  deploy-web:
    name: Build and Deploy Expo Web
    runs-on: ubuntu-latest

    steps:
      # Checks out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Node.js for the Expo web build
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brown-bottle-app/package-lock.json

      # Installs frontend dependencies
      - name: Install frontend dependencies
        working-directory: brown-bottle-app
        run: npm ci

      # Builds the Expo web export into brown-bottle-app/dist
      - name: Export Expo web build
        working-directory: brown-bottle-app
        run: npx expo export --platform web

      # Loads the private SSH key into the SSH agent
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Adds the server host key so SSH can connect without prompts
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # Ensures the deployment directory exists on the server
      - name: Ensure remote web directory exists
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p '${{ secrets.SERVER_WEB_PATH }}'"

      # Syncs the built web files to the server
      - name: Deploy web files to server
        run: |
          rsync -avz --delete \
            brown-bottle-app/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SERVER_WEB_PATH }}/
